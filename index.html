<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미세먼지 경보 알림판</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        .controls { text-align: center; margin-bottom: 20px; }
        button { padding: 12px 25px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; color: white; }
        .warning { background: #fbbc04; color: black; }
        .danger { background: #ea4335; }
        #loader { display: none; text-align: center; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>😷 실시간 미세먼지 경보 현황</h1>
    <div class="controls">
        <button onclick="fetchDust()">데이터 새로고침</button>
    </div>
    
    <div id="loader">데이터를 불러오는 중...</div>
    
    <table>
        <thead>
            <tr>
                <th>지역</th>
                <th>단계</th>
                <th>농도</th>
                <th>발령시간</th>
            </tr>
        </thead>
        <tbody id="content">
            <tr><td colspan="4">데이터가 없습니다. 버튼을 눌러주세요.</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function fetchDust() {
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        loader.style.display = 'block';
        content.innerHTML = '';

        const API_KEY = "17cca3209a4686361868213ba9c4bd566dac91d5afd379016f0529ebc32253b8";
        // 연도를 현재 연도(2026)로 동적 설정
        const year = new Date().getFullYear();
        const url = `http://apis.data.go.kr/B552584/UlfptcaAlarmInqireSvc/getUlfptcaAlarmInfo?serviceKey=${API_KEY}&returnType=json&numOfRows=50&pageNo=1&year=${year}&itemCode=PM10`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('네트워크 응답에 문제가 있습니다.');
            
            const result = await response.json();
            const items = result.response.body.items;

            if (items.length === 0) {
                content.innerHTML = '<tr><td colspan="4">현재 발령된 경보가 없습니다. 공기가 깨끗합니다! ✨</td></tr>';
            } else {
                items.forEach(item => {
                    const badgeClass = item.issueGbn === '경보' ? 'danger' : 'warning';
                    content.innerHTML += `
                        <tr>
                            <td><strong>${item.districtName}</strong><br><small>${item.moveName}</small></td>
                            <td><span class="badge ${badgeClass}">${item.issueGbn}</span></td>
                            <td>${item.issueVal} μg/m³</td>
                            <td>${item.issueDate}<br>${item.issueTime}</td>
                        </tr>
                    `;
                });
            }
        } catch (error) {
            console.error(error);
            content.innerHTML = `<tr><td colspan="4" style="color:red;">오류 발생: API 호출이 차단되었습니다. <br> 
                1. 주소창의 <b>'주의 요함(HTTP)'</b> 차단을 해제하거나 <br>
                2. 로컬에서 실행 시 크롬 확장도구(CORS Unblock)를 사용해야 합니다.</td></tr>`;
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
