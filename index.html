<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미세먼지 경보 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl md:text-3xl font-bold mb-2 uppercase tracking-tight">🚩 전국 미세먼지 경보 발령 현황</h1>
            <p class="opacity-80">공공데이터포털 실시간 API 데이터 (2026년 기준)</p>
        </div>

        <div class="p-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8">
                <div class="flex items-center space-x-4 bg-gray-100 p-2 rounded-lg w-full md:w-auto">
                    <label class="flex items-center space-x-2 cursor-pointer px-4 py-2 rounded-md transition" id="label-pm10">
                        <input type="radio" name="itemCode" value="PM10" checked class="hidden">
                        <span class="font-medium text-gray-700">PM10 미세먼지</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer px-4 py-2 rounded-md transition" id="label-pm25">
                        <input type="radio" name="itemCode" value="PM25" class="hidden">
                        <span class="font-medium text-gray-700">PM25 초미세먼지</span>
                    </label>
                </div>
                <button id="refreshBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition duration-300 ease-in-out transform hover:scale-105 flex items-center gap-2 w-full md:w-auto justify-center">
                    <i class="fas fa-sync-alt" id="syncIcon"></i> 데이터 새로고침
                </button>
            </div>

            <div id="statusArea" class="hidden mb-6 p-4 rounded-xl text-center font-medium"></div>

            <div class="overflow-x-auto rounded-xl border border-gray-200">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 text-gray-600 text-sm">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">지역</th>
                            <th class="px-6 py-4 text-left font-semibold">상세지역</th>
                            <th class="px-6 py-4 text-left font-semibold">발령단계</th>
                            <th class="px-6 py-4 text-left font-semibold">농도</th>
                            <th class="px-6 py-4 text-left font-semibold">발령일시</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-100 text-sm text-gray-700">
                        </tbody>
                </table>
            </div>

            <div id="emptyState" class="py-20 text-center">
                <i class="fas fa-wind text-gray-300 text-6xl mb-4"></i>
                <p class="text-gray-500">데이터가 없습니다. 새로고침을 눌러주세요.</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "17cca3209a4686361868213ba9c4bd566dac91d5afd379016f0529ebc32253b8";
        // CORS 프록시 주소 (AllOrigins 사용)
        const PROXY_URL = "https://api.allorigins.win/get?url=";
        const TARGET_URL = "http://apis.data.go.kr/B552584/UlfptcaAlarmInqireSvc/getUlfptcaAlarmInfo";

        const refreshBtn = document.getElementById('refreshBtn');
        const syncIcon = document.getElementById('syncIcon');
        const statusArea = document.getElementById('statusArea');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');

        // 라디오 버튼 스타일링 제어
        function updateRadioStyles() {
            document.querySelectorAll('input[name="itemCode"]').forEach(input => {
                const label = document.getElementById(`label-${input.value.toLowerCase()}`);
                if(input.checked) {
                    label.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
                } else {
                    label.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
                }
            });
        }
        document.querySelectorAll('input[name="itemCode"]').forEach(el => el.addEventListener('change', updateRadioStyles));
        updateRadioStyles();

        refreshBtn.addEventListener('click', async () => {
            const itemCode = document.querySelector('input[name="itemCode"]:checked').value;
            
            // UI 초기화
            syncIcon.classList.add('fa-spin');
            refreshBtn.disabled = true;
            statusArea.className = "mb-6 p-4 rounded-xl text-center font-medium bg-blue-50 text-blue-700 block";
            statusArea.innerText = "🔄 데이터를 불러오고 있습니다...";

            // API 파라미터 구성
            const params = new URLSearchParams({
                serviceKey: API_KEY, // 프록시 사용 시 디코딩 불필요한 경우가 많음
                returnType: 'json',
                numOfRows: '100',
                pageNo: '1',
                year: '2026',
                itemCode: itemCode
            });

            const finalUrl = `${TARGET_URL}?${params.toString()}`;
            
            try {
                // 프록시 서버를 통해 fetch 요청
                const response = await fetch(`${PROXY_URL}${encodeURIComponent(finalUrl)}`);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents); // 프록시는 결과를 contents 문자열에 담아줌

                const items = data.response.body.items;
                tableBody.innerHTML = '';

                if (items && items.length > 0) {
                    items.forEach(item => {
                        const row = `
                            <tr class="hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-bold text-gray-900">${item.districtName}</td>
                                <td class="px-6 py-4">${item.moveName}</td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 rounded-full text-xs font-bold ${item.issueGbn === '경보' ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-600'}">
                                        ${item.issueGbn}
                                    </span>
                                </td>
                                <td class="px-6 py-4 font-mono text-indigo-600 font-bold">${item.issueVal}㎍/㎥</td>
                                <td class="px-6 py-4 text-xs text-gray-500">${item.issueDate}<br>${item.issueTime}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                    
                    emptyState.style.display = 'none';
                    statusArea.className = "mb-6 p-4 rounded-xl text-center font-medium bg-green-50 text-green-700";
                    statusArea.innerText = `✅ 실시간 발령 현황 : 총 ${items.length}건`;
                } else {
                    emptyState.style.display = 'block';
                    statusArea.className = "mb-6 p-4 rounded-xl text-center font-medium bg-gray-100 text-gray-600";
                    statusArea.innerText = "✨ 현재 발령된 경보가 없습니다.";
                }
            } catch (error) {
                statusArea.className = "mb-6 p-4 rounded-xl text-center font-medium bg-red-50 text-red-700";
                statusArea.innerText = "❌ 데이터 로드 실패 (API 키 또는 서버 상태 확인)";
                console.error(error);
            } finally {
                syncIcon.classList.remove('fa-spin');
                refreshBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
