<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미세먼지 경보 알림이</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .status-box { margin-top: 20px; display: none; }
        .loading { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚩 전국 미세먼지 경보 발령 현황</h1>
        <p class="text-muted">공공데이터포털 API를 연동한 실시간 데이터입니다.</p>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">측정 항목 선택</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="itemCode" id="pm10" value="PM10" checked>
                <label class="form-check-label" for="pm10">PM10 (미세먼지)</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="itemCode" id="pm25" value="PM25">
                <label class="form-check-label" for="pm25">PM25 (초미세먼지)</label>
            </div>
        </div>
    </div>

    <button id="refreshBtn" class="btn btn-primary w-100 mb-4">실시간 데이터 새로고침</button>

    <div id="loading" class="text-center loading mb-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p>데이터를 불러오는 중입니다...</p>
    </div>

    <div id="statusMsg" class="alert status-box"></div>

    <div class="table-responsive">
        <table class="table table-hover mt-3" id="dataTable" style="display:none;">
            <thead class="table-dark">
                <tr>
                    <th>지역</th>
                    <th>상세지역</th>
                    <th>발령단계</th>
                    <th>농도</th>
                    <th>날짜</th>
                    <th>시간</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_KEY = "17cca3209a4686361868213ba9c4bd566dac91d5afd379016f0529ebc32253b8";
    const BASE_URL = "https://apis.data.go.kr/B552584/UlfptcaAlarmInqireSvc/getUlfptcaAlarmInfo";

    document.getElementById('refreshBtn').addEventListener('click', async () => {
        const itemCode = document.querySelector('input[name="itemCode"]:checked').value;
        const loading = document.getElementById('loading');
        const statusMsg = document.getElementById('statusMsg');
        const dataTable = document.getElementById('dataTable');
        const tableBody = document.getElementById('tableBody');

        // 초기화
        loading.style.display = 'block';
        statusMsg.style.display = 'none';
        dataTable.style.display = 'none';
        tableBody.innerHTML = '';

        // API 파라미터 설정
        const params = new URLSearchParams({
            serviceKey: decodeURIComponent(API_KEY), // 인증키 디코딩 필요할 수 있음
            returnType: 'json',
            numOfRows: '100',
            pageNo: '1',
            year: '2026',
            itemCode: itemCode
        });

        try {
            const response = await fetch(`${BASE_URL}?${params.toString()}`);
            const data = await response.json();
            const items = data.response.body.items;

            loading.style.display = 'none';

            if (items && items.length > 0) {
                statusMsg.className = "alert alert-success status-box";
                statusMsg.style.display = "block";
                statusMsg.innerText = `✅ 현재 ${items.length}건의 경보가 발령 중입니다.`;
                
                items.forEach(item => {
                    const row = `<tr>
                        <td>${item.districtName}</td>
                        <td>${item.moveName}</td>
                        <td>${item.issueGbn}</td>
                        <td>${item.issueVal}</td>
                        <td>${item.issueDate}</td>
                        <td>${item.issueTime}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
                dataTable.style.display = 'table';
            } else {
                statusMsg.className = "alert alert-info status-box";
                statusMsg.style.display = "block";
                statusMsg.innerText = "✨ 현재 발령된 경보가 없습니다. 공기가 깨끗하네요!";
            }
        } catch (error) {
            loading.style.display = 'none';
            statusMsg.className = "alert alert-danger status-box";
            statusMsg.style.display = "block";
            statusMsg.innerText = "❌ 데이터를 가져오는 중 오류가 발생했습니다. (CORS 문제 또는 API 키 확인 필요)";
            console.error(error);
        }
    });
</script>

</body>
</html>
